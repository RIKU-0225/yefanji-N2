<script>
    // ======================= 根据图片全新例句 =======================
    const baseGrammar = [
        { id:"gram_1", title:"～際(に)", meaning:"在…的时候（书面语）",
          explanation:`<p>🔹 <strong>用法</strong>：表示“在某个特定场合或时间点”，郑重的「とき」。多用于通知、公告、演讲等书面语。</p><p>🔹 <strong>接续</strong>：动词辞书形 / 名词+の + 際に。</p>`,
          fixedExamples:[
            { jpRuby:'この整理券は、商品受け取りの際、必要です。', plainJp:'この整理券は、商品受け取りの際、必要です。', cn:'这张排号单在领取商品时需要用到。' },
            { jpRuby:'こちらの会議室をご利用になる際は、受付で必要事項をご記入ください。', plainJp:'こちらの会議室をご利用になる際は、受付で必要事項をご記入ください。', cn:'使用这间会议室时，请在前台登记必要事项。' },
            { jpRuby:'アメリカの大統領は来日した際に、わたしたちの大学でスピーチを行った。', plainJp:'アメリカの大統領は来日した際に、わたしたちの大学でスピーチを行った。', cn:'美国总统访问日本时，在我们大学做了演讲。' }
        ]},
        { id:"gram_2", title:"～に際して・～にあたって", meaning:"在…之际（郑重/书面）",
          explanation:`<p>🔹 <strong>用法</strong>：表示面临某个重要时间节点或事件，后续往往带有意志、决心或行动。非常郑重。</p><p>🔹 <strong>接续</strong>：动词辞书形 / 名词 + に際して / にあたって。</p>`,
          fixedExamples:[
            { jpRuby:'工事関係者は工事を始めるに際して、近所の住民にあいさつをして回った。', plainJp:'工事関係者は工事を始めるに際して、近所の住民にあいさつをして回った。', cn:'施工人员在开始施工前，走访问候了附近的住户。' },
            { jpRuby:'当ショッピングサイトのご利用に際して、以下のご利用条件をよくお読みください。', plainJp:'当ショッピングサイトのご利用に際して、以下のご利用条件をよくお読みください。', cn:'使用本购物网站时，请仔细阅读以下使用条款。' },
            { jpRuby:'新しい事業を始めるにあたって、しっかりと準備をしようと思っております。', plainJp:'新しい事業を始めるにあたって、しっかりと準備をしようと思っております。', cn:'在新开展一项业务之际，我想做好充分的准备。' },
            { jpRuby:'お二人の門出にあたりまして、お祝いの言葉を申し上げます。', plainJp:'お二人の門出にあたりまして、お祝いの言葉を申し上げます。', cn:'值此二位迎接新生活之际，送上我的祝福。' },
            { jpRuby:'日本で国際会議を開催するにあたり、関係各方面からの協力を得た。', plainJp:'日本で国際会議を開催するにあたり、関係各方面からの協力を得た。', cn:'在日本召开国际会议之际，得到了相关各方面的支持与配合。' }
        ]},
        { id:"gram_3", title:"～たとたん(に)", meaning:"刚一…就…（瞬间/意外）",
          explanation:`<p>🔹 <strong>用法</strong>：表示前项动作刚结束的一瞬间，后项立刻发生。时间间隔极短，后项往往是意想不到的事情。</p><p>🔹 <strong>接续</strong>：动词た形 + とたん(に)。</p>`,
          fixedExamples:[
            { jpRuby:'山の頂上でワインを一口飲んだとたんに、めまいがした。', plainJp:'山の頂上でワインを一口飲んだとたんに、めまいがした。', cn:'在山上刚喝了一口葡萄酒就头晕了。' },
            { jpRuby:'夫は結婚前は優しかったが、結婚したとたんに、態度が変わった。', plainJp:'夫は結婚前は優しかったが、結婚したとたんに、態度が変わった。', cn:'丈夫在婚前很温柔，但是一结婚，态度就变了。' },
            { jpRuby:'国の中に電話をかけた。母の声を聞いたとたん、涙があふれてきた。', plainJp:'国の中に電話をかけた。母の声を聞いたとたん、涙があふれてきた。', cn:'给家乡的妈妈打了电话。一听到妈妈的声音，我就热泪盈眶。' },

        const savedContent = localStorage.getItem(GLOBAL_NOTE_KEY) || "";
        const container = document.createElement('div'); container.className = 'global-note-container';
        container.innerHTML = `<div class="global-note-header"><div class="global-note-title">📘 全局笔记框 · 自由记录<span>跨页面永久保存</span></div><div class="global-note-tools"><button class="save-global-btn">💾 保存笔记</button><button class="clear-global-btn">🗑 清空</button></div></div><textarea class="global-note-textarea" rows="4" placeholder="写下整体学习心得、重点总结……"></textarea><div class="global-note-footer"><span class="char-counter">0 字符</span><span>✨ 独立于语法卡片，永久留存</span></div>`;
        const textarea = container.querySelector('.global-note-textarea'); const saveBtn = container.querySelector('.save-global-btn'); const clearBtn = container.querySelector('.clear-global-btn'); const counterSpan = container.querySelector('.char-counter');
        textarea.value = savedContent; const updateCounter = () => { counterSpan.innerText = textarea.value.length + ' 字符'; }; updateCounter(); textarea.addEventListener('input', updateCounter);
        saveBtn.addEventListener('click', () => { localStorage.setItem(GLOBAL_NOTE_KEY, textarea.value); showToast("全局笔记已保存 ✨", 1200); });
        clearBtn.addEventListener('click', () => { showConfirmDialog("清空全局笔记", "确定清空？", () => { textarea.value = ""; localStorage.setItem(GLOBAL_NOTE_KEY, ""); updateCounter(); showToast("全局笔记已清空", 1000); }); });
        grammarList.insertAdjacentElement('afterend', container);
    }
    function addUsageFooter() {
        if (document.querySelector('.usage-footer')) return;
        const footerElem = document.querySelector('footer');
        const usageDiv = document.createElement('div');
        usageDiv.className = 'usage-footer';
        usageDiv.innerHTML = `<h4>📖 使用说明</h4>
        <p>✅ <strong>拖选备注</strong>：鼠标拖选任意日语/中文文字，点击“添加备注”即可添加永久备注，支持背景色与跨会话保存。</p>
        <p>✏️ <strong>例句自由编辑</strong>：每个语法卡片下的固定例句均支持“编辑”修改、一键“还原”；自己的例句支持编辑/删除，数据自动保存。</p>
        <p>🔊 <strong>例句朗读</strong>：点击每个例句下方的“朗读例句”按钮，可播放日语发音（需浏览器支持）。</p>
        <p>⭐ <strong>星级评价</strong>：每个语法点可评分1~3星，标记掌握程度。</p>
        <p>📝 <strong>笔记功能</strong>：每张卡片拥有独立笔记区；页面底部的“全局笔记框”可记录整体心得，自动保存。</p>
        <p>💾 <strong>永久存储</strong>：所有备注、自定义例句、笔记、评分均保存在本地浏览器，关闭或刷新页面不会丢失。</p>`;
        footerElem.parentNode.insertBefore(usageDiv, footerElem);
    }
    document.body.addEventListener('mouseup', onTextSelection);
    initialRender();
    if(window.speechSynthesis) window.speechSynthesis.getVoices();
</script>
</body>
</html>
