            font-weight: 600;

            gap: 0.8rem;
            align-items: baseline;
            flex-wrap: wrap;
        }

            flex: 1;
            min-width: 180px;
            background: #e2e8f0;
            border-radius: 30px;
            height: 10px;
            overflow: hidden;

        .progress-fill {
            width: 7.69%;
            background: #e67e22;
            height: 100%;

        }

            background: #fff4e6;
            padding: 0.3rem 1rem;

            flex-direction: column;

            background: #e9ecef;
            color: #2c3e66;

            background: #e67e22;
            color: white;
            box-shadow: 0 1px 3px rgba(230,126,34,0.2);

            color: #94a3b8;
        }

            font-weight: 700;

            align-items: center;

            font-size: 0.8rem;

            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #f9f5ef;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;

            font-size: 0.9rem;

            color: #f5b042;
            text-shadow: 0 0 1px #e67e22;
        }

            padding: 0.6rem 1.4rem;

            gap: 8px;

            color: #b45f1b;

            cursor: pointer;
            user-select: none;

            background: #fff7e8;
            color: #c45c0c;

            width: 100%;
            background: #2c7da0;
            border: none;
            color: white;

            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;

            background: #1f6390;
            transform: scale(0.98);
        }

            background: #cbd5e1;
            color: #5e6f8d;
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.8;
        }

            background: #fefefe;
            border-color: #e9edf2;
        }

            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid #e2edf2;
            font-size: 0.8rem;
            color: #7f8c8d;

            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);

        { id: 24, title: "提案·意志", unit: "💪 意志·提案", grammarItems: [{ name: "〜ようではないか", star: 2 },{ name: "〜ことだ", star: 3 },{ name: "〜ものではない", star: 2 },{ name: "〜ことはない", star: 2 },{ name: "〜まいか", star: 2 },{ name: "〜ものか", star: 3 }], available: false, brief: "让我们…吧、最好…、不该…、没必要…、要不要…、怎么会…" },
        { id: 25, title: "強くそう感じる", unit: "❤️ 情感强调", grammarItems: [{ name: "〜てしかたがない", star: 2 },{ name: "〜てしようがない", star: 2 },{ name: "〜てたまらない", star: 3 },{ name: "〜てならない", star: 2 },{ name: "〜てやまない", star: 3 }], available: false, brief: "…得不得了、…得受不了、…得不行、由衷地…" },
        { id: 26, title: "願う・感動する", unit: "✨ 愿望·感动", grammarItems: [{ name: "〜たいものだ", star: 2 },{ name: "〜ものだ（感慨）", star: 3 },{ name: "〜ないものか", star: 3 },{ name: "〜ものがある", star: 2 },{ name: "〜ことだ", star: 1 },{ name: "〜ことか", star: 2 }], available: false, brief: "真希望…、真是…呀、难道不能…吗、有…的一面、真是…、多么…啊" }
    ];

    // 统一处理，生成 grammarPoints 和 starStats
    function buildLessonData(raw) {
        const grammarPoints = raw.grammarItems.map(item => item.name);
        const stats = { three: 0, two: 0, one: 0 };
        raw.grammarItems.forEach(item => {
            if (item.star === 3) stats.three++;
            else if (item.star === 2) stats.two++;
            else stats.one++;
        });
        return {
            ...raw,
            grammarPoints: grammarPoints,
            starStats: stats,
            grammarItems: raw.grammarItems
        };
    }

    const lessonsData = lessonsRaw.map(lesson => buildLessonData(lesson));

    function showToastMsg(message, duration = 1800) {
        const existingToast = document.querySelector('.custom-toast');
        if (existingToast) existingToast.remove();
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            if (toast && toast.parentNode) toast.remove();
        }, duration);
    }

    function handleLessonClick(lesson, event) {
        if (event && event.stopPropagation) event.stopPropagation();
        if (lesson.available && lesson.path) {
            window.location.href = lesson.path;
        } else {
            showToastMsg(`✨ 第${lesson.id}课「${lesson.title}」每日更新1课，即将解锁，敬请期待～`, 1900);
        }
    }

    // 根据星级返回对应的标签样式类（默认无高亮时的类）
    function getTagClassByStar(star) {
        if (star === 3) return "tag tag-star-three";
        if (star === 2) return "tag tag-star-two";
        return "tag tag-star-one";
    }

    // 为单个标签绑定点击高亮（同一卡片内唯一高亮）
    function bindTagHighlight(tagElement, parentCard) {
        tagElement.addEventListener('click', (e) => {
            e.stopPropagation();  // 防止触发卡片跳转
            // 检查当前是否已经高亮
            const isActive = tagElement.classList.contains('tag-highlight');
            // 移除同一卡片内其他标签的高亮
            const allTagsInCard = parentCard.querySelectorAll('.tag');
            allTagsInCard.forEach(t => t.classList.remove('tag-highlight'));
            // 如果之前没有高亮，则高亮当前标签；否则已经移除，保持无高亮
            if (!isActive) {
                tagElement.classList.add('tag-highlight');
                // 可选轻提示语法名称
                const grammarName = tagElement.innerText;
                showToastMsg(`✨ 聚焦语法：${grammarName}`, 1000);
            } else {
                // 已取消高亮
                showToastMsg(`已取消高亮`, 800);
            }
        });
    }

    function buildStarStatsHTML(stats) {
        return `
            <div class="star-stats-area">
                <div class="stat-item"><span class="star-icon">★★★</span> <strong>${stats.three}</strong>个</div>
                <div class="stat-item"><span class="star-icon">★★☆</span> <strong>${stats.two}</strong>个</div>
                <div class="stat-item"><span class="star-icon">★☆☆</span> <strong>${stats.one}</strong>个</div>
                <div style="margin-left: auto; font-size:0.7rem; color:#b0986a;">⭐点击标签高亮突出</div>
            </div>
        `;
    }

    function renderGrid() {
        const gridContainer = document.getElementById('lessonGrid');
        if (!gridContainer) return;
        gridContainer.innerHTML = '';

        lessonsData.forEach(lesson => {
            const card = document.createElement('div');
            card.className = 'lesson-card';
            if (!lesson.available) {
                card.classList.add('locked-card');
            }

            // 头部
            const cardHeader = document.createElement('div');
            cardHeader.className = 'card-header';
            const numberSpan = document.createElement('span');
            numberSpan.className = 'lesson-number';
            numberSpan.innerText = `第${lesson.id}课`;
            const statusSpan = document.createElement('span');
            statusSpan.className = `status-badge ${lesson.available ? 'open' : 'locked'}`;
            statusSpan.innerText = lesson.available ? '✅ 已开放' : '⏳ 即将上线';
            cardHeader.appendChild(numberSpan);
            cardHeader.appendChild(statusSpan);
            
            // 单元徽章
            const unitWrapper = document.createElement('div');
            unitWrapper.style.padding = "0 1.4rem";
            unitWrapper.style.marginTop = "0.5rem";
            const unitBadge = document.createElement('span');
            unitBadge.className = 'unit-badge';
            unitBadge.innerText = lesson.unit;
            unitWrapper.appendChild(unitBadge);

            const titleDiv = document.createElement('div');
            titleDiv.className = 'card-title';
            titleDiv.innerText = lesson.title;

            // 星级统计区域
            const statsElement = document.createElement('div');
            statsElement.innerHTML = buildStarStatsHTML(lesson.starStats);
            const statsContainer = statsElement.firstChild;

            // 语法标签区域
            const tagsDiv = document.createElement('div');
            tagsDiv.className = 'grammar-tags';
            lesson.grammarItems.forEach(item => {
                const tagSpan = document.createElement('span');
                tagSpan.className = getTagClassByStar(item.star);
                tagSpan.innerText = item.name;
                tagsDiv.appendChild(tagSpan);
            });

            // 绑定标签高亮事件（需要传入card容器，便于同卡片内唯一高亮）
            const allTagSpans = tagsDiv.querySelectorAll('.tag');
            allTagSpans.forEach(tag => {
                bindTagHighlight(tag, card);
            });

            const descDiv = document.createElement('div');
            descDiv.className = 'card-desc';
            descDiv.innerText = lesson.brief;

            const actionDiv = document.createElement('div');
            actionDiv.className = 'card-action';
            const studyBtn = document.createElement('button');
            studyBtn.className = 'study-btn';
            if (!lesson.available) {
                studyBtn.classList.add('disabled-btn');
                studyBtn.innerHTML = '🔒 即将开放';
                studyBtn.disabled = true;
            } else {
                studyBtn.innerHTML = '📖 开始学习 →';
                studyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleLessonClick(lesson, e);
                });
            }
            actionDiv.appendChild(studyBtn);

            card.appendChild(cardHeader);
            card.appendChild(unitWrapper);
            card.appendChild(titleDiv);
            card.appendChild(statsContainer);
            card.appendChild(tagsDiv);
            card.appendChild(descDiv);
            card.appendChild(actionDiv);

            // 卡片本身点击跳转 (仅开放课程)
            if (lesson.available) {
                card.style.cursor = 'pointer';
                card.addEventListener('click', (e) => {
                    // 如果点击目标本身就是标签或标签内部，不触发卡片跳转（已经优先处理标签高亮）
                    if (e.target.classList && e.target.classList.contains('tag')) return;
                    if (studyBtn.contains(e.target)) return;
                    handleLessonClick(lesson, e);
                });
            } else {
                card.style.cursor = 'default';
                card.addEventListener('click', (e) => {
                    if (e.target.classList && e.target.classList.contains('tag')) return;
                    if (studyBtn.contains(e.target)) return;
                    showToastMsg(`📖 第${lesson.id}课「${lesson.title}」每日更新1课，即将上线`, 1600);
                });
            }
            gridContainer.appendChild(card);
        });
    }

    function init() {
        renderGrid();
        console.log("业繁集N2语法 | 点击语法标签高亮（同卡片唯一高亮）已启用，金色描边代表三星重点");
    }
    init();
</script>
</body>
</html>
