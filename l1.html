<body>
<div class="container">
    <h1>1課 ～とき・～直後に</h1>
    <div class="sub">🖍️ 拖选任意文字 → 添加备注；<span style="color:#e67e22;">✅ 终极修复：刷新页面、关闭浏览器再打开，所有备注都会完整恢复！</span></div>
    <div id="grammar-list"></div>
    <!-- 此处原本 .info-note 上方将动态插入全局笔记框，静态占位，JS插入更灵活，但保留原有 info-note 便于定位 -->
    <div class="info-note" id="infoNoteStatic">
        💡 <strong>备注永久留存说明</strong>：<br>
        · 添加备注后，数据会立即保存到浏览器本地存储。<br>
        · 即使关闭网页或刷新，下次打开时备注会自动重新显示在原本的文字上。<br>
        · 备注支持修改背景色、内容，也可以删除。<br>
        · 本版采用“文本节点精确定位”技术，恢复率接近100%。
    </div>
    <div id="debugPanel" class="debug-info">🟢 备注永久保存引擎已就绪 | 刷新页面备注不会丢失</div>
    <footer>数据保存在浏览器中 | 备注跨会话永久留存</footer>
</div>

<script>
    // ======================= 固定语法数据 =======================
    const baseGrammar = [
        { id:"gram_1", title:"～際(に)", meaning:"在…的时候；借…之机（正式/书面）",
          explanation:`<p>🔹 <strong>用法</strong>：表示“在某个特定场合或时间点”，相当于郑重的「とき」。多用于通知、公告、演讲等书面或正式口语。</p><p>🔹 <strong>接续</strong>：动词辞书形 / 名词+の + 際に。</p><p>🔹 <strong>注意</strong>：不能用于单纯的时间先后顺序。常与「場合」区分：「際」更强调“机会/节点”。</p>`,
          fixedExamples:[
            { jpRuby:'<ruby>申<rt>もう</rt></ruby>し<ruby>込<rt>こ</rt></ruby>みの<ruby>際<rt>さい</rt></ruby>に、<ruby>身分証明書<rt>みぶんしょうめいしょ</rt></ruby>が<ruby>必要<rt>ひつよう</rt></ruby>です。', plainJp:"申し込みの際に、身分証明書が必要です。", cn:"申请时，需要身份证明。" },
            { jpRuby:'<ruby>非常<rt>ひじょう</rt></ruby>の<ruby>際<rt>さい</rt></ruby>は、この<ruby>非常口<rt>ひじょうぐち</rt></ruby>を<ruby>利用<rt>りよう</rt></ruby>ください。', plainJp:"非常の際は、この非常口をご利用ください。", cn:"紧急情况时，请使用此紧急出口。" },
            { jpRuby:'<ruby>発車<rt>はっしゃ</rt></ruby>の<ruby>際<rt>さい</rt></ruby>は、ドアにご<ruby>注意<rt>ちゅうい</rt></ruby>ください。', plainJp:"発車の際は、ドアにご注意ください。", cn:"发车时，请注意车门。" }
        ]},
        { id:"gram_2", title:"～に際して・～にあたって", meaning:"在…之际（重要节点，郑重）",
          explanation:`<p>🔹 <strong>用法</strong>：表示面临某个重要时间节点或事件，后续往往带有意志、决心或行动。非常郑重的书面语。</p><p>🔹 <strong>接续</strong>：动词辞书形 / 名词 + に際して / にあたって。</p><p>🔹 <strong>区别</strong>：「～にあたって」更强调“着手做某事的关键时刻”。</p>`,
          fixedExamples:[
            { jpRuby:'<ruby>開会<rt>かいかい</rt></ruby>に<ruby>際<rt>さい</rt></ruby>して、<ruby>一言<rt>ひとこと</rt></ruby>ご<ruby>挨拶<rt>あいさつ</rt></ruby><ruby>申<rt>もう</rt></ruby>し<ruby>上<rt>あ</rt></ruby>げます。', plainJp:"開会に際して、一言ご挨拶申し上げます。", cn:"在开会之际，我简单说几句。" },
            { jpRuby:'<ruby>新製品<rt>しんせいひん</rt></ruby>の<ruby>発売<rt>はつばい</rt></ruby>にあたって、<ruby>注意点<rt>ちゅういてん</rt></ruby>を<ruby>説明<rt>せつめい</rt></ruby>します。', plainJp:"新製品の発売にあたって、注意点を説明します。", cn:"在新产品发售之际，说明注意事项。" },
            { jpRuby:'<ruby>卒業<rt>そつぎょう</rt></ruby>にあたって、<ruby>先生方<rt>せんせいがた</rt></ruby>に<ruby>感謝<rt>かんしゃ</rt></ruby>を<ruby>伝<rt>つた</rt></ruby>えたい。', plainJp:"卒業にあたって、先生方に感謝を伝えたい。", cn:"毕业之际，想向老师们表达感谢。" }
        ]},
        { id:"gram_3", title:"～たとたん(に)", meaning:"刚一…就…（瞬间、意外）",
          explanation:`<p>🔹 <strong>用法</strong>：表示前项动作刚结束的一瞬间，后项立刻发生。时间间隔极短，后项往往是意想不到的事情。</p><p>🔹 <strong>接续</strong>：动词た形 + とたん(に)。</p><p>🔹 <strong>注意</strong>：后项不能是意志动作。</p>`,
          fixedExamples:[
            { jpRuby:'ドアを<ruby>開<rt>あ</rt></ruby>けたとたん、<ruby>猫<rt>ねこ</rt></ruby>が<ruby>飛<rt>と</rt></ruby>び<ruby>出<rt>だ</rt></ruby>した。', plainJp:"ドアを開けたとたん、猫が飛び出した。", cn:"刚一开门，猫就窜了出去。" },
            { jpRuby:'<ruby>立<rt>た</rt></ruby>ち<ruby>上<rt>あ</rt></ruby>がったとたんに、めまいがした。', plainJp:"立ち上がったとたんに、めまいがした。", cn:"刚一站起来，就头晕了。" },
            { jpRuby:'<ruby>電車<rt>でんしゃ</rt></ruby>が<ruby>止<rt>と</rt></ruby>まったとたん、<ruby>携帯<rt>けいたい</rt></ruby>が<ruby>鳴<rt>な</rt></ruby>った。', plainJp:"電車が止まったとたん、携帯が鳴った。", cn:"电车刚停下，手机就响了。" }
        ]},
        { id:"gram_4", title:"～(か)と思うと・～(か)と思ったら", meaning:"刚一…就…；忽而…忽而…",
          explanation:`<p>🔹 <strong>用法</strong>：表示两个动作几乎接连发生，强调惊讶、意外或快速变化，可表示反复交替。</p><p>🔹 <strong>接续</strong>：动词た形 + (か)と思うと / (か)と思ったら。</p>`,
          fixedExamples:[
            { jpRuby:'さっきまで<ruby>晴<rt>は</rt></ruby>れていたかと<ruby>思<rt>おも</rt></ruby>うと、もう<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>り<ruby>出<rt>だ</rt></ruby>した。', plainJp:"さっきまで晴れていたかと思うと、もう雨が降り出した。", cn:"刚才还晴着呢，转眼就下起雨来了。" },
            { jpRuby:'かれは<ruby>座<rt>すわ</rt></ruby>ったかと<ruby>思<rt>おも</rt></ruby>ったら、すぐに<ruby>立<rt>た</rt></ruby>ち<ruby>上<rt>あ</rt></ruby>がった。', plainJp:"彼は座ったかと思ったら、すぐに立ち上がった。", cn:"他刚坐下，马上就站起来了。" },
            { jpRuby:'<ruby>信号<rt>しんごう</rt></ruby>が<ruby>青<rt>あお</rt></ruby>になったかと<ruby>思<rt>おも</rt></ruby>うと、すぐに<ruby>赤<rt>あか</rt></ruby>に<ruby>変<rt>か</rt></ruby>わった。', plainJp:"信号が青になったかと思うと、すぐに赤に変わった。", cn:"信号灯刚变绿，马上就变成红色了。" }
        ]},
        { id:"gram_5", title:"～かないかのうちに", meaning:"几乎还没…就…（时间间隔极短）",

            gram.fixedExamples.forEach((ex, exIdx) => { const isModified = modifiedFixed.hasOwnProperty(exIdx); let displayJp = isModified ? modifiedFixed[exIdx].jp : ex.jpRuby; let displayCn = isModified ? modifiedFixed[exIdx].cn : ex.cn; const item = document.createElement('div'); item.className = 'example-item'; const jpDiv = document.createElement('div'); jpDiv.className = 'japanese-sentence'; if(isModified) jpDiv.innerText = displayJp; else jpDiv.innerHTML = displayJp; const cnDiv = document.createElement('div'); cnDiv.className = 'translation'; cnDiv.innerText = displayCn; const playBtn = document.createElement('button'); playBtn.className = 'play-btn'; playBtn.innerHTML = '▶ 朗读例句'; const plainText = isModified ? displayJp : ex.plainJp; playBtn.addEventListener('click',(e)=>{e.stopPropagation(); speakJapanese(plainText, playBtn);}); const actionsDiv = document.createElement('div'); actionsDiv.className = 'example-actions'; const editBtn = document.createElement('button'); editBtn.className = 'edit-btn'; editBtn.innerText = '编辑'; editBtn.addEventListener('click',(e)=>{e.stopPropagation(); editFixedExample(gid, exIdx, isModified ? displayJp : ex.plainJp, displayCn);}); actionsDiv.appendChild(editBtn); if(isModified){ const restoreBtn = document.createElement('button'); restoreBtn.className = 'restore-btn'; restoreBtn.innerText = '还原'; restoreBtn.addEventListener('click',(e)=>{e.stopPropagation(); restoreFixedExample(gid, exIdx);}); actionsDiv.appendChild(restoreBtn); } item.append(jpDiv, cnDiv, playBtn, actionsDiv); exampleListDiv.appendChild(item); });
            customs.forEach(ex => { exampleListDiv.appendChild(buildCustomExampleItem(gid, ex)); });
            const addForm = document.createElement('div'); addForm.className = 'add-example-form'; addForm.innerHTML = `<div style="font-weight:bold;">➕ 添加自己的例句</div><div class="form-row"><input type="text" placeholder="日语例句" class="custom-jp"></div><div class="form-row"><input type="text" placeholder="中文翻译" class="custom-cn"></div><div class="form-row"><button class="add-btn">➕ 添加例句</button></div>`; const addBtn = addForm.querySelector('.add-btn'), jpInput = addForm.querySelector('.custom-jp'), cnInput = addForm.querySelector('.custom-cn'); addBtn.addEventListener('click',()=>{ if(jpInput.value.trim() && cnInput.value.trim()) addCustomExample(gid, jpInput.value, cnInput.value); else showToast("填写完整"); jpInput.value=''; cnInput.value=''; }); exampleListDiv.appendChild(addForm);
            detailDiv.appendChild(exampleListDiv); card.append(header, detailDiv); container.appendChild(card);
            header.addEventListener('click', (e) => { if(e.target.classList?.contains('star')||e.target.parentElement?.classList?.contains('star')) return; const collapsed = detailDiv.classList.toggle('collapsed'); collapsedStates[gid]=collapsed; saveAllData(); });
        });
        restoreAllNotes();
        document.querySelectorAll('.grammar-card').forEach(card => bindNoteClickEvents(card));
        document.getElementById('debugPanel').innerHTML = "🟢 备注永久保存成功！刷新页面后所有备注都会自动恢复。";
    }

    // ========== 新增：底部全局笔记框 ==========
    const GLOBAL_NOTE_KEY = "global_bottom_note_storage_v1";
    function initGlobalNoteBox() {
        // 避免重复添加
        if (document.querySelector('.global-note-container')) return;
        const infoNote = document.querySelector('.info-note');
        if (!infoNote) return;
        
        const savedContent = localStorage.getItem(GLOBAL_NOTE_KEY) || "";
        const container = document.createElement('div');
        container.className = 'global-note-container';
        container.innerHTML = `
            <div class="global-note-header">
                <div class="global-note-title">
                    📘 全局笔记框 · 自由记录
                    <span>跨页面永久保存</span>
                </div>
                <div class="global-note-tools">
                    <button class="save-global-btn">💾 保存笔记</button>
                    <button class="clear-global-btn">🗑 清空</button>
                </div>
            </div>
            <textarea class="global-note-textarea" rows="4" placeholder="在这里写下你的整体学习心得、重点总结或任何想法……&#10;内容会自动保存在浏览器中，下次打开依然存在。"></textarea>
            <div class="global-note-footer">
                <span class="char-counter">0 字符</span>
                <span>✨ 独立于语法卡片，永久留存</span>
            </div>
        `;
        const textarea = container.querySelector('.global-note-textarea');
        const saveBtn = container.querySelector('.save-global-btn');
        const clearBtn = container.querySelector('.clear-global-btn');
        const counterSpan = container.querySelector('.char-counter');
        
        textarea.value = savedContent;
        const updateCounter = () => { counterSpan.innerText = textarea.value.length + ' 字符'; };
        updateCounter();
        textarea.addEventListener('input', updateCounter);
        
        // 保存
        const saveGlobalNote = () => {
            const content = textarea.value;
            localStorage.setItem(GLOBAL_NOTE_KEY, content);
            showToast("全局笔记已保存 ✨", 1200);
        };
        saveBtn.addEventListener('click', saveGlobalNote);
        
        // 清空（二次确认）
        clearBtn.addEventListener('click', () => {
            showConfirmDialog("清空全局笔记", "确定要清空全局笔记吗？清空后无法撤销。", () => {
                textarea.value = "";
                localStorage.setItem(GLOBAL_NOTE_KEY, "");
                updateCounter();
                showToast("全局笔记已清空", 1000);
            });
        });
        
        // 放在 info-note 的正上方（备注说明文字上面）
        infoNote.parentNode.insertBefore(container, infoNote);
    }
    
    document.body.addEventListener('mouseup', onTextSelection);
    initialRender();
    initGlobalNoteBox();   // 新增底部笔记框
    if(window.speechSynthesis) window.speechSynthesis.getVoices();
</script>
</body>
</html>
